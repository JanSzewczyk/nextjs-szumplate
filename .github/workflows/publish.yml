name: Publish 📦🚀

on:
  push:
    branches: [main]

env:
  BUN_VERSION: "1.1.38"

jobs:
  publish:
    name: Publish 📦🚀
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code 📚
        uses: actions/checkout@v6
      - name: Set up Bun 🟢
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install packages ⚙️
        run: bun install --frozen-lockfile
