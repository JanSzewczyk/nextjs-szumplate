name: PR Checks ✅

on:
  pull_request:

env:
  CI: true
  NODE_VERSION: "24"
  SKIP_ENV_VALIDATION: true

permissions:
  pull-requests: write

jobs:
  build:
    name: Build 🏗️
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code 📚
        uses: actions/checkout@v6
      - name: Set up Node.js 🟢
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - name: Install dependencies ⚙️
        run: npm ci
      - name: Build Check 🏗️
        run: npm run build
  #        env:
  #          SOME_SECRET: ${{ secret.SOME_SECRET }}

  build-storybook:
    name: Build Storybook 📖🏗️
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code 📚
        uses: actions/checkout@v6
      - name: Set up Node.js 🟢
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - name: Install packages ⚙️
        run: npm ci
      - name: Build Check 🏗️
        run: npm run storybook:build

  prettier:
    name: Prettier 🧹
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code 📚
        uses: actions/checkout@v6
      - name: Set up Node.js 🟢
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - name: Install dependencies ⚙️
        run: npm ci
      - name: Prettier Check 🧹
        run: npm run prettier:check

  lint:
    name: ESlint ⬣
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code 📚
        uses: actions/checkout@v6
      - name: Set up Node 🟢
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - name: Install dependencies ⚙️
        run: npm ci
      #      - name: Install utils ⚙️
      #        run: npm install @microsoft/eslint-formatter-sarif
      - name: ESlint Check ⬣
        run: npm run lint:ci
        continue-on-error: true
  #      - name: Upload ESlint results to GitHub
  #        uses: github/codeql-action/upload-sarif@v4
  #        with:
  #          sarif_file: eslint-results.sarif
  #          wait-for-processing: true

  type-check:
    name: TypeScript 🛠️
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code 📚
        uses: actions/checkout@v6
      - name: Set up Node.js 🟢
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - name: Install dependencies ⚙️
        run: npm ci
      - name: TypeScript Check 🛠️
        run: npm run type-check

  test-unit:
    name: Test Unit 🧪
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code 📚
        uses: actions/checkout@v6
      - name: Set up Node.js 🟢
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - name: Install packages ⚙️
        run: npm ci
      - name: Run Unit Tests 🧪
        run: npm run test:unit:coverage
      - name: Upload Unit Coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-unit
          path: coverage-unit/
          retention-days: 1

  test-storybook:
    name: Test Storybook 📖🧪
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code 📚
        uses: actions/checkout@v6
      - name: Set up Node.js 🟢
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - name: Install packages ⚙️
        run: npm ci
      - name: Cache Playwright Browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
      - name: Install Playwright (Chromium only)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
      - name: Ensure Playwright deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - name: Run Storybook Tests 📖🧪
        run: npm run test:storybook:coverage
      - name: Upload Storybook Coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-storybook
          path: coverage-storybook/
          retention-days: 1

  report-coverage:
    name: Coverage Report 📊
    runs-on: ubuntu-latest
    needs: [test-unit, test-storybook]
    if: always()
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Download Unit Coverage
        uses: actions/download-artifact@v8
        with:
          name: coverage-unit
          path: coverage-unit/
      - name: Download Storybook Coverage
        uses: actions/download-artifact@v8
        with:
          name: coverage-storybook
          path: coverage-storybook/
      - name: Merge Coverage Reports
        run: |
          mkdir -p .nyc_input coverage-merged
          cp coverage-unit/coverage-final.json .nyc_input/unit.json
          cp coverage-storybook/coverage-final.json .nyc_input/storybook.json
          npx nyc merge .nyc_input coverage-merged/coverage-final.json
          mkdir -p .nyc_merged
          cp coverage-merged/coverage-final.json .nyc_merged/merged.json
          npx nyc report --reporter=json-summary --temp-dir=.nyc_merged --report-dir=coverage-merged
      - name: Report Merged Coverage
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage-merged/coverage-summary.json
          json-final-path: coverage-merged/coverage-final.json

  e2e-test:
    name: Playwright 🎭
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code 📚
        uses: actions/checkout@v6
      - name: Set up Node.js 🟢
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - name: Install dependencies ⚙️
        run: npm ci
      - name: Build app 🏗️
        run: npm run build
      - name: Install Playwright Browsers ⚙️
        run: npx playwright install --with-deps
      - name: Playwright tests check 🎭
        run: npm run test:e2e:ci
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code 📚
        uses: actions/checkout@v6
      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          comment-summary-in-pr: on-failure
