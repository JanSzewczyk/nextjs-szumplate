name: Publish 📦🚀

on:
  push:
    branches: [main]

env:
  NODE_VERSION: "24"

jobs:
  publish:
    name: Publish 📦🚀
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code 📚
        uses: actions/checkout@v6
      - name: Set up Node.js 🟢
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - name: Install packages ⚙️
        run: npm ci
